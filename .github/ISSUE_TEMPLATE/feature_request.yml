name: Feature request
description: Suggest a new capability or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need does this solve?
      placeholder: I am frustrated when...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
      placeholder: I would like to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other solutions or workarounds you evaluated.
      placeholder: I also considered...
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, mockups, references, or acceptance criteria.
      placeholder: Add context here.
    validations:
      required: false
